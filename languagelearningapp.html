<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Language Learning App</title>

<style>

body{
font-family:Arial;
background:#eef5ff;
text-align:center;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px lightgray;
}

h1{
color:#2b5cff;
}

.card{
background:#f5f8ff;
padding:15px;
margin:10px 0;
border-radius:10px;
}

button{
padding:10px 18px;
background:#2b5cff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin:8px;
}

button:hover{
opacity:0.9;
}

input{
padding:10px;
width:80%;
border-radius:8px;
border:1px solid gray;
}

#result{
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>📚 Language Learning App</h1>

<h2>Daily Lesson</h2>

<div class="card" id="lesson"></div>

<button onclick="nextLesson()">
Next Lesson
</button>

<hr>

<h2>Quiz</h2>

<p id="question"></p>

<input
type="text"
id="answer"
placeholder="Enter translation">

<br><br>

<button onclick="checkAnswer()">
Submit
</button>

<p id="result"></p>

<hr>

<h2>Progress</h2>

<p>
Score:
<span id="score">0</span>
</p>

</div>

<script>

const lessons=[

{
word:"Hello",
translation:"Namaste"
},

{
word:"Thank You",
translation:"Dhanyavadalu"
},

{
word:"Good Morning",
translation:"Subhodayam"
},

{
word:"Friend",
translation:"Snehithudu"
}

];

let current=0;

let score=
localStorage.getItem("score")||0;

document
.getElementById("score")
.innerText=score;

showLesson();

function showLesson(){

document
.getElementById("lesson")
.innerHTML=`

<h3>
${lessons[current].word}
</h3>

<p>
Translation:
${lessons[current].translation}
</p>

`;

document
.getElementById("question")
.innerText=
`Translate: ${lessons[current].word}`;

}

function nextLesson(){

current++;

if(current>=lessons.length){

current=0;

}

document
.getElementById("answer")
.value="";

document
.getElementById("result")
.innerText="";

showLesson();

}

function checkAnswer(){

let userAnswer=
document
.getElementById("answer")
.value
.toLowerCase();

let correct=
lessons[current]
.translation
.toLowerCase();

if(userAnswer===correct){

score++;

localStorage
.setItem(
"score",
score
);

document
.getElementById("score")
.innerText=score;

document
.getElementById("result")
.innerText=
"✅ Correct";

}
else{

document
.getElementById("result")
.innerText=
"❌ Wrong";

}

}

</script>

</body>

</html>
